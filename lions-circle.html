<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LION’S CIRCLE | PHRINUSOMYIS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .portal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #111 0%, #000 70%);
            transition: opacity 0.8s ease;
        }

        .gold-emblem {
            width: 80px;
            height: 80px;
            border: 2px solid #D4AF37;
            border-radius: 50%;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(212, 175, 55, 0.3); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        }

        h1 {
            font-size: 28px;
            letter-spacing: 10px;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            color: #D4AF37;
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 15px 0 50px;
        }

        .access-box {
            width: 100%;
            max-width: 380px;
            border: 1px solid #1a1a1a;
            padding: 50px 40px;
            background-color: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            position: relative;
        }

        .status-msg {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            height: 15px;
            color: #444;
        }

        .input-group {
            margin-bottom: 30px;
            position: relative;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #222;
            color: #ffffff;
            padding: 12px 0;
            font-size: 14px;
            letter-spacing: 3px;
            outline: none;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        input:focus {
            border-bottom: 1px solid #D4AF37;
        }

        input::placeholder {
            color: #333;
            font-size: 10px;
            letter-spacing: 2px;
        }

        .enter-btn {
            width: 100%;
            background: #D4AF37;
            color: #000;
            border: none;
            padding: 18px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .enter-btn:hover {
            background: #ffffff;
            letter-spacing: 6px;
        }

        .error-shake {
            animation: shake 0.4s ease;
            border-bottom-color: #ff3e3e !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .asset-link {
            margin-top: 35px;
            display: block;
            color: #444;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        .asset-link:hover { color: #D4AF37; }
    </style>
</head>
<body>

    <div class="portal-container" id="portal">
        <div class="gold-emblem">
            <span>LC</span>
        </div>

        <h1>LION’S CIRCLE</h1>
        <div class="subtitle">PRIVATE ACCESS</div>

        <div class="access-box">
            <div class="status-msg" id="status">Awaiting Identification...</div>
            
            <div class="input-group">
                <input type="text" id="identityId" placeholder="IDENTITY ID" autocomplete="off">
            </div>

            <div class="input-group">
                <input type="password" id="accessCode" placeholder="ACCESS KEY">
            </div>

            <button class="enter-btn" onclick="validateAccess()">Validate</button>

            <a href="/luxury" class="asset-link">VERIFY PHYSICAL ASSET SERIAL NUMBER</a>
        </div>
    </div>

    <script>
        /**
         * LION'S CIRCLE AUTHENTICATION LOGIC
         * Handles visual feedback and validation protocols
         */
        function validateAccess() {
            const idInput = document.getElementById('identityId');
            const keyInput = document.getElementById('accessCode');
            const status = document.getElementById('status');
            const btn = document.querySelector('.enter-btn');

            // Initial Feedback
            status.innerText = "Encrypting Protocol...";
            status.style.color = "#D4AF37";
            btn.innerText = "Processing...";
            btn.disabled = true;

            setTimeout(() => {
                const identity = idInput.value.trim().toUpperCase();
                const key = keyInput.value.trim();

                // Validation logic (You can change these placeholders)
                if (identity === "" || key === "") {
                    handleFailure("Credentials Required");
                } else {
                    // Logic for "Failed Authentication" simulation
                    // In a live environment, this would call your private API
                    handleFailure("Access Denied: Identity Not Recognized");
                }
            }, 1800);
        }

        function handleFailure(message) {
            const status = document.getElementById('status');
            const btn = document.querySelector('.enter-btn');
            const inputs = document.querySelectorAll('input');

            status.innerText = message;
            status.style.color = "#ff3e3e";
            
            inputs.forEach(input => {
                input.classList.add('error-shake');
                setTimeout(() => input.classList.remove('error-shake'), 500);
            });

            btn.innerText = "Validate";
            btn.disabled = false;
        }

        // Add 'Enter' key support
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validateAccess();
            }
        });
    </script>
</body>
</html>
