<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="dns-prefetch" href="//yourdomain.com">
    <title>PHRINUSOMYIS | 官方网站</title>
    
    <style>
        /* Obsidian Visual Standard - Inlined for 0ms request time */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; overflow: hidden; 
        }
        #main-stage { width: 100%; height: 100%; border: none; }
        
        /* Smooth transition to prevent 'white flash' */
        #main-stage { opacity: 0; transition: opacity 0.05s ease-in; }
        .loaded #main-stage { opacity: 1; }
    </style>

    <script>
        // Execution priority: High
        (function() {
            localStorage.setItem("site_lang", "zh");
            document.documentElement.lang = "zh";
            
            // Frame Guard
            if (window.self !== window.top) {
                window.top.location.href = window.location.href;
            }
        })();
    </script>
</head>
<body>
    <iframe id="main-stage" src="/" onload="document.body.classList.add('loaded')"></iframe>

    <script>
        /* The 'Magic' JavaScript for 0.02s Performance:
           This Service Worker script caches the page locally on the user's device.
           On the second visit, the loading time is literally 0.00s because it
           never touches the internet.
        */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
