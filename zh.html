<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHRINUSOMYIS</title>
    
    <style>
        /* Obsidian Visual Standard */
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #main-stage { width: 100%; height: 100%; border: none; }
    </style>

    <script>
        // 1. Check if the user has ALREADY been set to Chinese
        // Or if they are coming from a specific link
        let currentLang = localStorage.getItem("site_lang");

        if (currentLang === 'zh') {
            document.title = "PHRINUSOMYIS | 官方网站";
            // The 'Home' is / so we stay right here.
        }

        // 2. Security: No unauthorized framing
        if (window.self !== window.top) {
            window.top.location.href = window.location.href;
        }
    </script>
</head>
<body>
    <iframe id="main-stage" src="/main.html"></iframe>
</body>
</html>
