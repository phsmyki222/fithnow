<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHRINUSOMYIS</title>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #main-stage { width: 100%; height: 100%; border: none; }
    </style>

    <script>
        // 1. Check the URL for the language trigger
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang');

        // 2. If it's zh, set the memory and update the title
        if (lang === 'zh' || localStorage.getItem("site_lang") === 'zh') {
            localStorage.setItem("site_lang", "zh");
            document.title = "PHRINUSOMYIS | 官方网站";
        }

        // 3. Frame-Busting Security
        if (window.self !== window.top) {
            window.top.location.href = window.location.href;
        }
    </script>
</head>
<body>
    <iframe id="main-stage" src="https://phrinusomyis.com"></iframe>
</body>
</html>
