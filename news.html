<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>PHRINUSOMYIS News Center — Global Updates & Announcements</title>

<meta name="description" content="PHRINUSOMYIS News Center. Stay updated with global developments, market expansion, and official announcements across continents.">
<meta name="keywords" content="PHRINUSOMYIS news, global updates, Africa news, Europe expansion, luxury events">
<meta name="robots" content="index, follow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Open Graph -->
<meta property="og:title" content="PHRINUSOMYIS News Center">
<meta property="og:description" content="Official global news updates and announcements from PHRINUSOMYIS.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://phrinusomyis.com/news">
<meta property="og:image" content="https://phrinusomyis.com/assets/Phrinusomyis_logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#D4AF37;
  --black:#050505;
  --glass:rgba(255,255,255,0.03);
  --border:rgba(212,175,55,0.15);
}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:var(--black);
  color:#fff;
  overflow-x:hidden;
}

.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center,#0a0a0a,#050505);
  z-index:-1;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

header{
  text-align:center;
  margin-bottom:40px;
}

h1{
  font-family:'Cinzel',serif;
  color:var(--gold);
  font-size:2.8rem;
  letter-spacing:6px;
}

.sub{
  color:#aaa;
  font-size:0.8rem;
  letter-spacing:3px;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px 0;
  flex-wrap:wrap;
}

nav a{
  color:var(--gold);
  border:1px solid var(--border);
  padding:8px 16px;
  border-radius:8px;
  text-decoration:none;
}

nav a:hover{
  background:var(--gold);
  color:#000;
}

.filters{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.filters button{
  background:transparent;
  border:1px solid var(--border);
  color:#ccc;
  padding:8px 12px;
  cursor:pointer;
  border-radius:6px;
}

.filters button:hover{
  background:var(--gold);
  color:#000;
}

.news-grid{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:var(--glass);
  border:1px solid var(--border);
  padding:20px;
  border-radius:12px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:var(--gold);
}

.card h2{
  font-family:'Cinzel',serif;
  color:var(--gold);
  font-size:1.2rem;
}

.meta{
  font-size:0.7rem;
  color:#888;
  margin-bottom:10px;
}

.category{
  display:inline-block;
  font-size:0.6rem;
  padding:3px 8px;
  border:1px solid var(--border);
  border-radius:20px;
  margin-bottom:10px;
  color:#aaa;
}

footer{
  text-align:center;
  margin-top:60px;
  font-size:0.7rem;
  color:var(--gold);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<header>
  <h1>PHRINUSOMYIS NEWS</h1>
  <p class="sub">GLOBAL UPDATES • STRATEGIC EXPANSION • MEDIA COVERAGE</p>
</header>

<nav>
  <a href="/">Home</a>
  <a href="/news">News</a>
  <a href="/events">Events</a>
  <a href="/press">Press</a>
</nav>

<div class="filters">
  <button onclick="filterNews('all')">All</button>
  <button onclick="filterNews('global')">Global</button>
  <button onclick="filterNews('africa')">Africa</button>
  <button onclick="filterNews('europe')">Europe</button>
  <button onclick="filterNews('asia')">Asia</button>
</div>

<div class="news-grid" id="news"></div>

<footer>
© 2026 PHRINUSOMYIS GLOBAL NEWS NETWORK
</footer>

</div>

<script>

const newsData = [
{
  title:"Global Expansion Strategy Accelerates",
  date:"2026-03-10T08:00:00Z",
  category:"global",
  text:"PHRINUSOMYIS advances its worldwide expansion strategy across key markets."
},
{
  title:"West Africa Development Hub Strengthened",
  date:"2026-04-08T08:00:00Z",
  category:"africa",
  text:"New operational frameworks are being established across West Africa."
},
{
  title:"European Market Entry Progress Update",
  date:"2026-03-15T08:00:00Z",
  category:"europe",
  text:"Strategic expansion continues across major European territories."
},
{
  title:"Asia Infrastructure Collaboration Announced",
  date:"2026-03-25T08:00:00Z",
  category:"asia",
  text:"New partnerships support long-term growth in Asia markets."
}
];

let currentFilter="all";

function renderNews(){
  const container=document.getElementById("news");
  container.innerHTML="";

  let filtered = newsData;

  if(currentFilter !== "all"){
    filtered = newsData.filter(n => n.category === currentFilter);
  }

  filtered.sort((a,b)=> new Date(b.date)-new Date(a.date));

  filtered.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";

    const date=new Date(item.date).toLocaleDateString("en-GB");

    card.innerHTML=`
      <div class="category">${item.category.toUpperCase()}</div>
      <h2>${item.title}</h2>
      <div class="meta">${date}</div>
      <p>${item.text}</p>
    `;

    container.appendChild(card);
  });
}

function filterNews(type){
  currentFilter=type;
  renderNews();
}

renderNews();

</script>

</body>
</html>
