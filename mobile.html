<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHRINUSOMYIS</title>

<style>
:root {
    --gold:#D4AF37;
    --bg:#000;
}
body {
    margin:0;
    background:var(--bg);
    color:white;
    font-family:sans-serif;
}

/* HEADER */
.app-header {
    position:fixed;
    top:0;
    width:100%;
    height:50px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    border-bottom:1px solid #222;
    z-index:1000;
}

/* LANGUAGE SWITCH */
select {
    background:black;
    color:var(--gold);
    border:1px solid var(--gold);
}

/* CONTENT */
.page-content {
    padding-top:60px;
    padding-bottom:80px;
}

/* DRAWER */
.mobile-drawer {
    position:fixed;
    bottom:0;
    width:100%;
    height:80vh;
    background:#111;
    border-top:2px solid var(--gold);
    border-radius:25px 25px 0 0;
    transform:translateY(calc(80vh - 65px));
    transition:0.4s;
}

.mobile-drawer.active {
    transform:translateY(0);
}

.handle {
    height:65px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.bar {
    width:40px;
    height:4px;
    background:#444;
    margin-bottom:8px;
}

/* MENU */
.house-menu {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:20px;
}

.house-btn {
    background:#1a1a1a;
    border:1px solid #333;
    padding:20px;
    text-align:center;
    text-decoration:none;
    color:white;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="app-header">
    <span>PHRINUSOMYIS</span>

    <select onchange="switchLang(this.value)">
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="es">ES</option>
        <option value="de">DE</option>
        <option value="ar">AR</option>
        <option value="zh">ZH</option>
    </select>
</div>

<div class="page-content" id="content">
    <h1>Welcome</h1>
    <p>This is your global platform.</p>
</div>

<div class="mobile-drawer" id="drawer">
    <div class="handle" onclick="toggleMenu()">
        <div class="bar"></div>
        <span style="color:var(--gold)">MENU</span>
    </div>

    <div class="house-menu">
        <a href="/en/" class="house-btn">Home</a>
        <a href="/en/news" class="house-btn">News</a>
        <a href="/en/events" class="house-btn">Events</a>
        <a href="/en/press" class="house-btn">Press</a>
        <a href="/en/articles" class="house-btn">Articles</a>
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById("drawer").classList.toggle("active");
}

// LANGUAGE SWITCH
function switchLang(lang) {
    const path = window.location.pathname.split("/").slice(2).join("/");
    window.location.href = "/" + lang + "/" + path;
}
</script>

</body>
</html>
