<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRINUSOMYIS Mobile</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #000;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background: var(--bg);
            font-family: sans-serif;
        }

        /* 1. THE TOP BAR (Translator) */
        .app-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 50px;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 15px;
            z-index: 3000;
            border-bottom: 1px solid #222;
        }

        /* 2. THE MIRROR (Loads your existing site) */
        .site-mirror {
            position: absolute;
            top: 50px; /* Below header */
            bottom: 60px; /* Above drawer handle */
            width: 100%;
            border: none;
        }

        /* 3. THE PULL-OUT DRAWER (The App Feature) */
        .mobile-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80vh; /* Opens to 80% of screen */
            background: #111;
            border-top: 2px solid var(--gold);
            border-radius: 25px 25px 0 0;
            transform: translateY(calc(80vh - 65px)); /* Hide except handle */
            transition: transform 0.4s ease-out;
            z-index: 4000;
        }

        .mobile-drawer.active {
            transform: translateY(0);
        }

        .handle {
            height: 65px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .bar { width: 40px; height: 4px; background: #444; border-radius: 2px; margin-bottom: 8px; }

        /* HOUSE GRID */
        .house-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .house-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div id="google_translate_element"></div> 
    </div>

    <iframe src="https://phrinusomyis.com" class="site-mirror" id="contentFrame"></iframe>

    <div class="mobile-drawer" id="appDrawer">
        <div class="handle" onclick="toggleMenu()">
            <div class="bar"></div>
            <span style="color:var(--gold); font-size: 12px; letter-spacing: 2px;">PHRINUSOMYIS MENU</span>
        </div>

        <div class="house-menu">
            <a href="#" onclick="loadPage('https://phrinusomyis.com')" class="house-btn">Home House</a>
            <a href="#" onclick="loadPage('https://phrinusomyis.com/news')" class="house-btn">News House</a>
            <a href="#" onclick="loadPage('https://phrinusomyis.com/events')" class="house-btn">Event House</a>
            <a href="#" onclick="loadPage('https://phrinusomyis.com/press')" class="house-btn">Press House</a>
            <a href="#" onclick="loadPage('https://phrinusomyis.com/articles')" class="house-btn">Article House</a>
        </div>
    </div>

    <script>
        // Toggle Function
        function toggleMenu() {
            document.getElementById('appDrawer').classList.toggle('active');
        }

        // Logic to "Mirror" the specific page requested
        function loadPage(url) {
            document.getElementById('contentFrame').src = url;
            toggleMenu(); // Close menu after selection
        }
    </script>


</body>
</html>
