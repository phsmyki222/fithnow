name: PHRINUSOMYIS-Engine

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manual start it for testing

# This part is CRITICAL: It gives the bot permission to write to your repo
permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Execute Authority Script
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}

      - name: Commit and Push Update
        run: |
          git config --global user.name "PHRINUSOMYIS-BOT"
          git config --global user.email "bot@phrinusomyis.com"
          git add intelligence.html
          git commit -m "Strategic Sync: June 27 Showcase Prep [$(date)]" || echo "No changes to commit"
          git push
