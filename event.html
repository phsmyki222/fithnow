<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHRINUSOMYIS | Luxury Time & Menu</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #D4AF37;
    --black: #050505;
    --glass-bg: rgba(0,0,0,0.3);
    --glass-border: rgba(212, 175, 55, 0.2);
    --accent-glow: rgba(212,175,55,0.3);
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background-color: var(--black);
    color: #fff;
    overflow-x: hidden;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    flex-wrap: wrap;
}

.logo {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    color: var(--gold);
    font-weight: 900;
    text-transform: uppercase;
}

nav {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

nav a {
    text-decoration: none;
    font-weight: 700;
    color: #fff;
    font-size: 0.95rem;
    letter-spacing: 1px;
    position: relative;
    transition: 0.3s ease;
}

nav a:hover {
    color: var(--gold);
}

nav a::after {
    content: '';
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -4px;
    left: 0;
    background-color: var(--gold);
    transition: 0.3s ease;
}

nav a:hover::after {
    width: 100%;
}

.clock-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin: 50px 0;
}

.clock-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(15px);
    border-radius: 12px;
    padding: 20px 25px;
    min-width: 80px;
    text-align: center;
    transition: 0.3s ease;
}

.clock-card:hover {
    box-shadow: 0 0 20px var(--accent-glow);
    border-color: var(--gold);
}

.clock-card .number {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--gold);
}

.clock-card .label {
    font-size: 0.7rem;
    color: #ccc;
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

@media (max-width: 768px) {
    header {
        justify-content: center;
        gap: 20px;
    }
    .clock-container {
        gap: 10px;
        margin: 30px 0;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">PHRINUSOMYIS</div>
    <nav>
        <a href="https://phrinusomyis.com" target="_blank">Home</a>
        <a href="https://phrinusomyis.com/press" target="_blank">Press/Media</a>
        <a href="https://phrinusomyis.com/events" target="_blank">Events</a>
        <a href="https://phrinusomyis.com/partnership" target="_blank">Sponsor/Partnership</a>
    </nav>
</header>

<div class="clock-container">
    <div class="clock-card">
        <div class="number" id="month">May</div>
        <div class="label">Month</div>
    </div>
    <div class="clock-card">
        <div class="number" id="day">23</div>
        <div class="label">Day</div>
    </div>
    <div class="clock-card">
        <div class="number" id="year">2026</div>
        <div class="label">Year</div>
    </div>
    <div class="clock-card">
        <div class="number" id="hours">22</div>
        <div class="label">Hours</div>
    </div>
    <div class="clock-card">
        <div class="number" id="minutes">04</div>
        <div class="label">Minutes</div>
    </div>
    <div class="clock-card">
        <div class="number" id="seconds">15</div>
        <div class="label">Seconds</div>
    </div>
</div>

<script>
// Live Time Update
function updateClock() {
    const now = new Date();
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    document.getElementById('month').textContent = monthNames[now.getMonth()];
    document.getElementById('day').textContent = now.getDate();
    document.getElementById('year').textContent = now.getFullYear();
    
    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    // Add leading zeros
    hours = hours < 10 ? '0'+hours : hours;
    minutes = minutes < 10 ? '0'+minutes : minutes;
    seconds = seconds < 10 ? '0'+seconds : seconds;

    document.getElementById('hours').textContent = hours;
    document.getElementById('minutes').textContent = minutes;
    document.getElementById('seconds').textContent = seconds;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
