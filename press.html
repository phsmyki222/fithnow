<script>

// ===== YOUR PRESS DATA =====
const pressNews =
[
{title:"PHRINUSOMYIS Establishes Strategic Direction for Global Operations", description:"", date:"2025-09-05T08:00:00+00:00"},
{title:"PHRINUSOMYIS Unveils New Luxury Entertainment Development Concept", description:"", date:"2025-09-15T08:00:00+00:00"},
{title:"PHRINUSOMYIS Launches Proprietary Internal Operational Framework", description:"", date:"2025-10-12T08:00:00+00:00"},
{title:"PHRINUSOMYIS Unveils Stadium-Scale Production Concept Designs", description:"", date:"2025-11-07T08:00:00+00:00"},
{title:"PHRINUSOMYIS Announces New International Media Positioning Strategy", description:"", date:"2025-11-20T08:00:00+00:00"},
{title:"PHRINUSOMYIS Debuts 2026 Global Innovation Strategy", description:"", date:"2026-01-01T08:00:00+00:00"},
{title:"PHRINUSOMYIS Announces Strategic Entry into Dubai Market", description:"", date:"2026-01-23T08:00:00+00:00"},
{title:"OFFICIAL: PHRINUSOMYIS Confirms International Debut in West Africa for July 24, 2026", description:"", date:"2026-02-08T08:00:00+00:00"},
{title:"PHRINUSOMYIS Expands Global Partner Ecosystem and Strategic Alliances", description:"", date:"2026-02-10T08:00:00+00:00"},
{title:"PHRINUSOMYIS Announces United Kingdom Market Entry Strategy", description:"", date:"2026-03-10T08:00:00+00:00"},
{title:"PHRINUSOMYIS Expands European Presence with France Market Entry", description:"", date:"2026-03-15T08:00:00+00:00"},
{title:"PHRINUSOMYIS Sets Strategic Framework for Spain Market Expansion", description:"", date:"2026-03-20T08:00:00+00:00"},
{title:"PHRINUSOMYIS Announces Major Entry into China Market", description:"", date:"2026-03-25T08:00:00+00:00"},
{title:"PHRINUSOMYIS Formalizes West African Market Expansion Hub", description:"", date:"2026-04-08T08:00:00+00:00"},
{title:"PHRINUSOMYIS Declares Full Operational Readiness for Global Event Execution", description:"", date:"2026-04-20T08:00:00+00:00"},
{title:"LIVE: PHRINUSOMYIS Hosts International Debut Showcase in West Africa", description:"", date:"2026-07-24T08:00:00+00:00"}
];

// ===== GENERATE CARDS =====
function generatePressCards() {
  const grid = document.getElementById("press-news");
  grid.innerHTML="";

  pressNews.sort((a,b)=> new Date(b.date)-new Date(a.date));

  document.getElementById("breaking-bar").innerText =
    "Latest Update: " + pressNews[0].title;

  pressNews.forEach((item,index)=>{
    const card=document.createElement("div");
    card.className="press-card";

    const badge=index<3?"<span style='color:gold;font-size:0.7rem;'>NEW</span><br>":"";

    const formattedDate = new Date(item.date).toLocaleDateString('en-GB',{
      day:'2-digit',month:'short',year:'numeric'
    });

    card.innerHTML=`
      ${badge}
      <h3>${item.title}</h3>
      <p style="color:#888;font-size:0.75rem;margin-bottom:8px;">${formattedDate}</p>
      <p>${item.description || "Official corporate update from PHRINUSOMYIS."}</p>
    `;

    grid.appendChild(card);
  });

  animatePressCards();
}

// ===== ANIMATION =====
function animatePressCards(){
  const cards=document.querySelectorAll(".press-card");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add("visible");
      }
    });
  });
  cards.forEach(card=>observer.observe(card));
}

// ===== CLOCK =====
function updateClock(){
  const now=new Date();
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("month").innerText=months[now.getMonth()];
  document.getElementById("day").innerText=now.getDate();
  document.getElementById("year").innerText=now.getFullYear();
  document.getElementById("hours").innerText=String(now.getHours()).padStart(2,'0');
  document.getElementById("minutes").innerText=String(now.getMinutes()).padStart(2,'0');
  document.getElementById("minutes").innerText=String(now.getsecond()).padStart(2,'0')
  document.getElementById("last-updated").innerText =
    "Last updated: " + now.toLocaleDateString();
}
function generateStructuredData(){
  const data = {
    "@context": "https://schema.org",
    "@graph": pressNews.map(item => ({
      "@type": "NewsArticle",
      "headline": item.title,
      "datePublished": item.date,
      "dateModified": item.date,
      "author": {
        "@type": "Organization",
        "name": "PHRINUSOMYIS"
      },
      "publisher": {
        "@type": "Organization",
        "name": "PHRINUSOMYIS",
        "logo": {
          "@type": "ImageObject",
          "url": "https://phrinusomyis.com/assets/Phrinusomyis_logo.png"
        }
      }
    }))
  };

  const script = document.createElement("script");
  script.type = "application/ld+json";
  script.textContent = JSON.stringify(data);
  document.head.appendChild(script);
}

generateStructuredData();
// ===== INIT =====
generatePressCards();
updateClock();
setInterval(updateClock,1000);

</script>
<div id="google_translate_element" style="display:none;"></div>

<script type="text/javascript">
function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        {
            pageLanguage: 'en',
            includedLanguages: 'en,fr,es,de,ar,zh,ru,pt,ja,ko,it,nl,tr,hi,id,vi,th,pl,sv,fi,da',
            autoDisplay: false
        },
        'google_translate_element'
    );

    // Apply saved language on load
    const savedLang = localStorage.getItem("site_lang");
    if (savedLang) {
        setTimeout(() => {
            changeLanguage(savedLang);
        }, 1000);
    }
}

// Change language function
function changeLanguage(lang) {
    const select = document.querySelector(".goog-te-combo");

    if (select) {
        select.value = lang;
        select.dispatchEvent(new Event("change"));

        localStorage.setItem("site_lang", lang);
    } else {
        console.warn("Google Translate not loaded yet");
    }
}

// Hook your dropdown
document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("languageSwitcher").addEventListener("change", function () {
        changeLanguage(this.value);
    });
});
</script>

<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
