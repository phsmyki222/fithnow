<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHRINUSOMYIS Media & Press — Stadium Events, Global Projects & Coverage</title>
<meta name="description" content="PHRINUSOMYIS Press Center | Africa-focused luxury events, news, and announcements. Stay updated on our worldwide productions.">
<meta name="keywords" content="PHRINUSOMYIS,News, luxury events, global press, cinematic productions">
<meta name="robots" content="index, follow">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#D4AF37;
  --black:#050505;
  --glass-bg:rgba(255,255,255,0.02);
  --glass-border:rgba(212,175,55,0.15);
  --accent-glow:rgba(212,175,55,0.3);
  --rainbow:linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background-color:var(--black);
  color:#fff;
  font-family:'Montserrat',sans-serif;
  line-height:1.8;
  overflow-x:hidden;
  user-select:none;
}
a{color:inherit;text-decoration:none;cursor:pointer;}
.cinematic-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #050505 100%);
  z-index:-1;
}
.container{max-width:1200px;margin:0 auto;padding:60px 20px;text-align:center;position:relative;}
nav{display:flex;justify-content:center;gap:30px;margin-bottom:50px;flex-wrap:wrap;}
nav a{
  color:var(--gold);
  font-family:'Cinzel',serif;
  font-weight:700;
  padding:10px 20px;
  border-radius:8px;
  border:1px solid var(--glass-border);
  transition:0.3s;
}
nav a:hover{background:var(--gold);color:var(--black);}
.brand-seal{width:160px;margin-bottom:20px;filter:drop-shadow(0 0 30px var(--accent-glow));}
h1{font-family:'Cinzel',serif;font-size:3rem;letter-spacing:8px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;}
.registry-status,.tagline{font-size:0.7rem;letter-spacing:4px;color:#888;border-top:1px solid var(--glass-border);display:inline-block;padding-top:10px;margin-bottom:30px;}
.ceo-name{color:var(--gold);text-shadow:0 0 15px var(--gold);font-weight:900;}
.contact-email{position:absolute;left:30px;down:100px;font-weight:700;background:var(--rainbow);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1rem;}
.live-clock{display:flex;justify-content:center;gap:15px;margin:30px 0;flex-wrap:wrap;}
.time-box{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  padding:20px 15px;
  border-radius:12px;
  min-width:80px;
  font-family:'Cinzel',serif;
  color:var(--gold);
  text-align:center;
}
.time-box .number{font-size:1.5rem;font-weight:900;}
.time-box .label{font-size:0.7rem;color:#ccc;margin-top:5px;text-transform:uppercase;}
.press-grid{display:flex;flex-direction:column;gap:30px;margin-top:40px;text-align:left;}
.press-card{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  padding:30px;
  backdrop-filter:blur(20px);
  transition:opacity 0.8s ease, transform 0.8s ease;
  opacity:0;
  transform:translateY(40px);
}
.press-card.visible{opacity:1;transform:translateY(0);}
.press-card h3{font-family:'Cinzel',serif;color:var(--gold);font-size:1.3rem;margin-bottom:10px;}
.press-card p{color:#ccc;font-size:0.85rem;text-align:justify;}
.last-updated{color:#ccc;font-size:0.75rem;text-align:right;margin-top:-30px;}
footer{margin-top:80px;font-size:0.65rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;text-shadow:0 0 5px #000;text-align:center;}
@media(max-width:768px){nav a{padding:8px 15px;font-size:0.85rem;}}
</style>
</head>
<body>
<div class="cinematic-bg"></div>
<div class="container">
<nav>
<a href="/">Homepage</a>
<a href="events">Events</a>
<a href="news">News</a>
<a href="article">Article</a>
</nav>

<img src="phrinusomyis_logo.png" alt="PHRINUSOMYIS Logo" class="brand-seal">
<h1>PHRINUSOMYIS Press Global Media</h1>
<p class="registry-status">PHRINUSOMYIS Data Center | Founder: <span class="ceo-name">Victor Seth A</span></p>
<p class="tagline">Engineering Legacy Moments</p>

<div class="live-clock">
  <div class="time-box"><div class="number" id="month"></div><div class="label">Month</div></div>
  <div class="time-box"><div class="number" id="day"></div><div class="label">Day</div></div>
  <div class="time-box"><div class="number" id="year"></div><div class="label">Year</div></div>
  <div class="time-box"><div class="number" id="hours"></div><div class="label">Hours</div></div>
  <div class="time-box"><div class="number" id="minutes"></div><div class="label">Minutes</div></div>
  <div class="time-box"><div class="number" id="seconds"></div><div class="label">Seconds</div></div>
</div>

<div class="contact-email">contact@phrinusomyis.com</div>
<p class="last-updated" id="last-updated">Last updated: </p>
<div class="press-grid" id="press-news"></div>

<footer>© 2026 PHRINUSOMYIS GLOBAL PRODUCTION. PHRINUSOMYIS PRESS RELEASE.</footer>
</div>

<script>
// Press News Data
const pressNews = [
  {title:"PHRINUSOMYIS Announces African Debut", description:"PHRINUSOMYIS is bringing stadium-scale luxury productions to Africa with unmatched audience experiences and worldwide press coverage.", date:"2026-04-08T08:00:00+00:00"},
  {title:"PHRINUSOMYIS Unveils New Global Event Strategy on April 13, 2026", description:"PHRINUSOMYIS today announced the launch of a new global event strategy designed to enhance international audience engagement… Include details and a quote from leadership.", date:"2026-04-08T08:30:00+00:00"},
  {title:"PHRINUSOMYIS Partners with Local Governments for West Africa Showcase April 10, 2026", description:"PHRINUSOMYIS is bringing stadium-scale luxury productions to Africa with unmatched audience experiences and worldwide press coverage.", date:"2026-04-08T08:00:00+00:00"},
  {title:"PHRINUSOMYIS Releases Official Event Schedule for 2026 by April 20, 2026", description:"PHRINUSOMYIS today published the official schedule of events planned for 2026. The calendar includes international showcases, regional productions, and audience engagement experiences across multiple continents.", date:"2026-04-08T08:30:00+00:00"},
  {title:"PHRINUSOMYIS Participates in Global Entertainment Conference April 9, 2026", description:"PHRINUSOMYIS attended the 2026 Global Entertainment & Media Conference, participating in panels, networking sessions, and industry discussions. The company shared insights on large-scale event production, international expansion, and audience engagement strategies.", date:"2026-04-08T08:00:00+00:00"},
  {title:"PHRINUSOMYIS Updates Leadership Team April 9, 2026", description:"PHRINUSOMYIS announces updates to its leadership team, including key executive appointments and promotions.", date:"2026-04-08T08:30:00+00:00"}
];

// Generate Press Cards
function generatePressCards() {
  const grid = document.getElementById("press-news");
  grid.innerHTML="";
  pressNews.forEach(item => {
    const card = document.createElement("div");
    card.className="press-card";
    card.innerHTML=`<h3>${item.title}</h3><p>${item.description}</p>`;
    grid.appendChild(card);
  });
}

// Animate Press Cards
function animatePressCards() {
  const cards = document.querySelectorAll(".press-card");
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add("visible");
        observer.unobserve(entry.target);
      }
    });
  },{threshold:0.2});
  cards.forEach(card=>observer.observe(card));
}

// Live Clock
function updateClock(){
  const now=new Date();
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("month").innerText=months[now.getMonth()];
  document.getElementById("day").innerText=now.getDate();
  document.getElementById("year").innerText=now.getFullYear();
  document.getElementById("hours").innerText=String(now.getHours()).padStart(2,'0');
  document.getElementById("minutes").innerText=String(now.getMinutes()).padStart(2,'0');
  document.getElementById("seconds").innerText=String(now.getSeconds()).padStart(2,'0');
  document.getElementById("last-updated").innerText = "Last updated: " + now.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}

// JSON-LD for SEO
function generateStructuredData(){
  const data={
    "@context":"https://schema.org",
    "@graph": pressNews.map(item=>({
      "@type":"NewsArticle",
      "headline": item.title,
      "description": item.description,
      "datePublished": item.date,
      "dateModified": item.date,
      "author":{"@type":"Organization","name":"PHRINUSOMYIS Global"},
      "publisher":{"@type":"Organization","name":"PHRINUSOMYIS Global","logo":{"@type":"ImageObject","url":"https://phrinusomyis.com/assets/Phrinusomyis_logo.png"}},
      "inLanguage":"en",
      "mainEntityOfPage":"https://phrinusomyis.com/press"
    }))
  };
  const script=document.createElement("script");
  script.type="application/ld+json";
  script.textContent=JSON.stringify(data);
  document.head.appendChild(script);
}

// Initialize Page
function initPressPage(){
  generatePressCards();
  animatePressCards();
  updateClock();
  generateStructuredData();
}

// Run
initPressPage();
setInterval(updateClock,1000);
</script>
</body>
</html>
