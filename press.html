// ===== GENERATE CARDS =====
function generatePressCards() {
  const grid = document.getElementById("press-news");
  grid.innerHTML="";

  pressNews.sort((a,b)=> new Date(b.date)-new Date(a.date));

  document.getElementById("breaking-bar").innerText =
    "Latest Update: " + pressNews[0].title;

  pressNews.forEach((item,index)=>{
    const card=document.createElement("div");
    card.className="press-card";

    const badge=index<3?"<span style='color:gold;font-size:0.7rem;'>NEW</span><br>":"";

    const formattedDate = new Date(item.date).toLocaleDateString('en-GB',{
      day:'2-digit',month:'short',year:'numeric'
    });

    card.innerHTML=`
      ${badge}
      <h3>${item.title}</h3>
      <p style="color:#888;font-size:0.75rem;margin-bottom:8px;">${formattedDate}</p>
      <p>${item.description || "Official corporate update from PHRINUSOMYIS."}</p>
    `;

    grid.appendChild(card);
  });

  animatePressCards();
}

// ===== ANIMATION =====
function animatePressCards(){
  const cards=document.querySelectorAll(".press-card");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add("visible");
      }
    });
  });
  cards.forEach(card=>observer.observe(card));
}

// ===== CLOCK =====
function updateClock(){
  const now=new Date();
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("month").innerText=months[now.getMonth()];
  document.getElementById("day").innerText=now.getDate();
  document.getElementById("year").innerText=now.getFullYear();
  document.getElementById("hours").innerText=String(now.getHours()).padStart(2,'0');
  document.getElementById("minutes").innerText=String(now.getMinutes()).padStart(2,'0');
  document.getElementById("seconds").innerText=String(now.getSeconds()).padStart(2,'0');
  document.getElementById("last-updated").innerText =
    "Last updated: " + now.toLocaleDateString();  
}
function generateStructuredData(){
  const data = {
    "@context": "https://schema.org",

       "logo": {
        "@type": "ImageObject",
        "url": "https://phrinusomyis.com/assets/Phrinusomyis_logo.png"
        }
      }
    }))
  };
  
  const script = document.createElement("script");
  script.type = "application/ld+json";
  script.textContent = JSON.stringify(data);
  document.head.appendChild(script);
}
