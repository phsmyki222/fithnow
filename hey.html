<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHRINUSOMYIS</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>

/* ================================
   ROOT SYSTEM
================================ */
:root {
    --gold: #D4AF37;
    --black: #050505;
}

/* ================================
   BASE RESET
================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
}

body {
    background: #050505;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
}

/* ================================
   HEADER
================================ */
.main-header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 90px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 5%;
    background: rgba(0,0,0,0.92);
    border-bottom: 1px solid rgba(212,175,55,0.3);
    backdrop-filter: blur(10px);
    z-index: 2000;
}

.logo-header {
    height: 70px;
}

.nav-menu {
    display: flex;
    gap: 30px;
}

.nav-menu a {
    color: #fff;
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 2px;
    opacity: 0.8;
    transition: 0.3s;
}

.nav-menu a:hover {
    color: var(--gold);
    opacity: 1;
}

/* ================================
   SECTIONS
================================ */
section {
    padding: 120px 8%;
    text-align: center;
    opacity: 0;
    transform: scale(0.98) translateY(40px);
    filter: blur(6px);
    transition: all 1s ease;
    position: relative;
}

section.active {
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);
}

/* ================================
   TYPOGRAPHY
================================ */
h1, h2 {
    font-family: 'Cinzel', serif;
    text-transform: uppercase;
    letter-spacing: 4px;
}

h1 {
    font-size: 3rem;
}

h2 {
    margin-bottom: 40px;
}

p {
    max-width: 900px;
    margin: 0 auto;
    line-height: 1.8;
    opacity: 0.8;
}

/* underline authority */
h2::after {
    content: "";
    display: block;
    width: 80px;
    height: 2px;
    background: var(--gold);
    margin: 15px auto 0;
    opacity: 0.6;
}

/* ================================
   VIDEO
================================ */
.video-container {
    position: relative;
    margin: 40px auto;
    max-width: 1200px;
    overflow: hidden;
    border-radius: 10px;
    border: 1px solid rgba(212,175,55,0.25);
}

.video-container video {
    width: 100%;
    display: block;
}

.video-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* ================================
   COUNTDOWN (DO NOT TOUCH IDS)
================================ */
.timer-grid {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-top: 40px;
}

.time-box {
    background: rgba(10,10,10,0.85);
    border: 1px solid rgba(212,175,55,0.25);
    padding: 20px;
    min-width: 110px;
    border-radius: 8px;
}

.time-box span {
    font-size: 2.5rem;
    font-weight: 900;
    display: block;
}

.time-box label {
    font-size: 0.7rem;
    opacity: 0.6;
}

/* ================================
   SOUL SURVIVE EMPHASIS
================================ */
#countdown2 {
    border-top: 1px solid rgba(212,175,55,0.2);
    border-bottom: 1px solid rgba(212,175,55,0.2);
    background: radial-gradient(circle, rgba(212,175,55,0.05), transparent 60%);
}

/* ================================
   STADIUM AMBIENT
================================ */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(212,175,55,0.05), transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(0,255,255,0.03), transparent 60%);
    z-index: -1;
}

/* ================================
   HOVER INTERACTION
================================ */
.time-box,
.video-container,
.nav-menu a {
    transition: 0.3s ease;
}

.time-box:hover,
.video-container:hover {
    transform: translateY(-5px);
}

/* ================================
   MOBILE
================================ */
@media (max-width: 768px) {

    section {
        padding: 90px 5%;
    }

    h1 {
        font-size: 2rem;
    }

    .nav-menu {
        flex-direction: column;
        position: absolute;
        top: 80px;
        right: 0;
        background: rgba(0,0,0,0.95);
        width: 180px;
    }

    .time-box span {
        font-size: 2rem;
    }
}

</style>
</head>

<body>

<header class="main-header">
    <img src="phrinusomyis_logo.png" class="logo-header">
    <nav class="nav-menu">
        <a href="/">HOME</a>
        <a href="/news">NEWS</a>
        <a href="/events">EVENTS</a>
        <a href="/contact">CONTACT</a>
    </nav>
</header>

<!-- HERO -->
<section id="home">
    <h1>PHRINUSOMYIS – Commanding the World Stage</h1>
    <p>
        PHRINUSOMYIS is the international organization responsible for the governance,
        development, and administration of Sports Theater.
    </p>
</section>

<!-- COUNTDOWN 1 (UNCHANGED IDS) -->
<section id="countdown1">
    <h2>Countdown to the Next SOUL SURVIVE</h2>
    <div class="timer-grid">
        <div class="time-box"><span id="d1">00</span><label>Days</label></div>
        <div class="time-box"><span id="h1">00</span><label>Hours</label></div>
        <div class="time-box"><span id="m1">00</span><label>Minutes</label></div>
        <div class="time-box"><span id="s1">00</span><label>Seconds</label></div>
    </div>
</section>

<!-- VIDEO -->
<section>
    <div class="video-container">
        <video autoplay muted loop playsinline src="video1.mp4"></video>
    </div>
</section>

<!-- COUNTDOWN 2 -->
<section id="countdown2">
    <h2>SOUL SURVIVE</h2>
    <div class="timer-grid">
        <div class="time-box"><span id="d2">00</span><label>Days</label></div>
        <div class="time-box"><span id="h2">00</span><label>Hours</label></div>
        <div class="time-box"><span id="m2">00</span><label>Minutes</label></div>
        <div class="time-box"><span id="s2">00</span><label>Seconds</label></div>
    </div>
</section>

<!-- JS SCROLL ENGINE -->
<script>
const sections = document.querySelectorAll("section");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("active");
        }
    });
}, { threshold: 0.15 });

sections.forEach(sec => observer.observe(sec));
</script>

</body>
</html>
