name: PHRINUSOMYIS-Engine

on:
  schedule:
    # This runs the engine every 6 hours automatically
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to start it manually anytime

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Execute Authority Script
        run: python main.py
