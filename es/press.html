<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRINUSOMYIS | Sala de Prensa</title>

    <style>
        /* Estándar Corporativo: Gold on Obsidian */
        * {
            box-sizing: border-box;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Contenedor de precisión para comunicados oficiales */
        .press-container {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Scrollbar en Oro para el entorno de medios */
        .press-container::-webkit-scrollbar {
            width: 5px;
        }
        .press-container::-webkit-scrollbar-thumb {
            background: #D4AF37; 
            border-radius: 5px;
        }
    </style>

    <script>
        // Idioma: Español
        localStorage.setItem("site_lang", "es");

        // Frame-buster de seguridad
        if (window.self !== window.top) {
            window.top.location.href = window.location.href;
        }
    </script>
</head>

<body>

    <div class="press-container">
        <iframe 
            src="https://phrinusomyis.com/press" 
            title="PHRINUSOMYIS Prensa"
            allow="autoplay; encrypted-media; picture-in-picture; clipboard-write"
            allowfullscreen>
        </iframe>
    </div>

</body>
    
</html>
