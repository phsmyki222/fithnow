<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRINUSOMYIS | Artículos y Reportajes</title>

    <style>
        /* Diseño de Élite: Oro sobre Obsidiana */
        * {
            box-sizing: border-box;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: #000; /* Negro Absoluto */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Contenedor optimizado para lectura profunda */
        .articulos-container {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Detalle de scrollbar en Oro para una estética de lujo */
        .articulos-container::-webkit-scrollbar {
            width: 6px;
        }
        .articulos-container::-webkit-scrollbar-thumb {
            background: #D4AF37; /* Oro */
            border-radius: 10px;
        }
    </style>

    <script>
        // Idioma: Español
        localStorage.setItem("site_lang", "es");

        // Seguridad: Evitar que el sitio sea encuadrado externamente
        if (window.self !== window.top) {
            window.top.location.href = window.location.href;
        }
    </script>
</head>

<body>

    <div class="articulos-container">
        <iframe 
            src="https://phrinusomyis.com/articles" 
            title="PHRINUSOMYIS Artículos Oficiales"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

</body>
    
</html>
