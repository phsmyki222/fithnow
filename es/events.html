<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRINUSOMYIS | Eventos</title>

    <style>
        /* Configuración Global: Estilo Oro sobre Obsidiana */
        * {
            box-sizing: border-box;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: #000; /* Negro Obsidiana */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Contenedor optimizado para un desplazamiento fluido en móviles */
        .contenedor-iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Barra de desplazamiento en Oro para mantener la identidad visual */
        .contenedor-iframe::-webkit-scrollbar {
            width: 5px;
        }
        .contenedor-iframe::-webkit-scrollbar-thumb {
            background: #D4AF37; /* Oro Puro */
            border-radius: 5px;
        }
    </style>

    <script>
        // Establecer el idioma del sitio a ESPAÑOL
        localStorage.setItem("site_lang", "es");

        // Protector de marco (Frame-buster)
        if (window.self !== window.top) {
            window.top.location.href = window.location.href;
        }
    </script>
</head>

<body>

    <div class="contenedor-iframe">
        <iframe 
            src="https://phrinusomyis.com/events" 
            title="PHRINUSOMYIS Eventos"
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

</body>
    
</html>
