    <style>
        :root {

<script>
// Countdown Logic
const eventDate = new Date("July 24, 2026 00:00:00").getTime();
const ticketDate = new Date("May 20, 2026 00:00:00").getTime();

function update() {
    const now = new Date().getTime();
    
    const d1 = eventDate - now;
    if(d1 > 0) {
        document.getElementById('days').innerText = Math.floor(d1 / 86400000);
        document.getElementById('hours').innerText = Math.floor((d1 % 86400000) / 3600000);
        document.getElementById('minutes').innerText = Math.floor((d1 % 3600000) / 60000);
        document.getElementById('seconds').innerText = Math.floor((d1 % 60000) / 1000);
    }

    const d2 = ticketDate - now;
    if(d2 > 0) {
        document.getElementById('t-days').innerText = Math.floor(d2 / 86400000);
        document.getElementById('t-hours').innerText = Math.floor((d2 % 86400000) / 3600000);
        document.getElementById('t-minutes').innerText = Math.floor((d2 % 3600000) / 60000);
        document.getElementById('t-seconds').innerText = Math.floor((d2 % 60000) / 1000);
    }
}
setInterval(update, 1000);
update();

// Translation Initialization
function googleTranslateElementInit() {
    new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element');
}

document.getElementById("languageSwitcher").addEventListener("change", function() {
    const select = document.querySelector(".goog-te-combo");
    if (select) {
        select.value = this.value;
        select.dispatchEvent(new Event("change"));
    }
});

// Security
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
