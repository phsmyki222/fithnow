<script>
// Disable Developer Tools
document.addEventListener('keydown', function(e) {
    if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key==='I'||e.key==='C'||e.key==='J')) || (e.ctrlKey && e.key==='U')){
        e.preventDefault();
        alert('Developer tools disabled');
    }
});
document.addEventListener('contextmenu', e => e.preventDefault());

// Event Countdown JS
const eventDate = new Date("July 24, 2026 00:00:00").getTime();
const ticketDate = new Date("May 20, 2026 00:00:00").getTime();

function updateCountdown() {
    const now = new Date().getTime();

    // Event Countdown
    let distance = eventDate - now;
    if(distance > 0){
        document.getElementById('days').innerText = Math.floor(distance / (1000*60*60*24));
        document.getElementById('hours').innerText = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
        document.getElementById('minutes').innerText = Math.floor((distance % (1000*60*60)) / (1000*60));
        document.getElementById('seconds').innerText = Math.floor((distance % (1000*60)) / 1000);
    } else {
        document.getElementById('days').innerText = 0;
        document.getElementById('hours').innerText = 0;
        document.getElementById('minutes').innerText = 0;
        document.getElementById('seconds').innerText = 0;
    }

    // Ticket Countdown
    let ticketDistance = ticketDate - now;
    if(ticketDistance > 0){
        document.getElementById('ticket-days').innerText = Math.floor(ticketDistance / (1000*60*60*24));
        document.getElementById('ticket-hours').innerText = Math.floor((ticketDistance % (1000*60*60*24)) / (1000*60*60));
        document.getElementById('ticket-minutes').innerText = Math.floor((ticketDistance % (1000*60*60)) / (1000*60));
        document.getElementById('ticket-seconds').innerText = Math.floor((ticketDistance % (1000*60)) / 1000);
    } else {
        document.getElementById('ticket-days').innerText = 0;
        document.getElementById('ticket-hours').innerText = 0;
        document.getElementById('ticket-minutes').innerText = 0;
        document.getElementById('ticket-seconds').innerText = 0;
    }
}
setInterval(updateCountdown, 1000);
updateCountdown();
</script>

<script type="text/javascript">
function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        {
            pageLanguage: 'en',
            includedLanguages: 'en,fr,es,de,ar,zh,ru,pt,ja,ko,it,nl,tr,hi,id,vi,th,pl,sv,fi,da',
            autoDisplay: false
        },
        'google_translate_element'
    );

    // Apply saved language on load
    const savedLang = localStorage.getItem("site_lang");
    if (savedLang) {
        setTimeout(() => {
            changeLanguage(savedLang);
        }, 1000);
    }
}

// Change language function
function changeLanguage(lang) {
    const select = document.querySelector(".goog-te-combo");

    if (select) {
        select.value = lang;
        select.dispatchEvent(new Event("change"));

        localStorage.setItem("site_lang", lang);
    } else {
        console.warn("Google Translate not loaded yet");
    }
}

// Hook your dropdown
document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("languageSwitcher").addEventListener("change", function () {
        changeLanguage(this.value);
    });
});
</script>

src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
