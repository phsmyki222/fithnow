<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRINUSOMYIS | Presserum</title>

    <style>
        /* Nulstilling for professionelt medie-layout */
        * {
            box-sizing: border-box;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: #000; /* Obsidian Black */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container optimeret til presmeddelelser og downloads */
        .presse-beholder {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
            background: #000;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Guld-accent scrollbar til det officielle mediekontor */
        .presse-beholder::-webkit-scrollbar {
            width: 5px;
        }
        .presse-beholder::-webkit-scrollbar-thumb {
            background: #D4AF37; /* Guld */
            border-radius: 5px;
        }
    </style>

    <script>
        // Sprogindstilling: Dansk
        localStorage.setItem("site_lang", "da");

        // Frame-buster: Sikrer integriteten af presseindholdet
        if (window.self !== window.top) {
            window.top.location.href = window.location.href;
        }
    </script>
</head>

<body>

    <div class="presse-beholder">
        <iframe 
            src="https://phrinusomyis.com/press.html" 
            title="PHRINUSOMYIS Officielle Pressemeddelelser"
            allow="autoplay; encrypted-media; picture-in-picture; clipboard-write"
            allowfullscreen>
        </iframe>
    </div>

</body>
    
</html>
