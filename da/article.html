<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRINUSOMYIS | Artikler & Nyheder</title>

    <style>
        /* Global Reset */
        * {
            box-sizing: border-box;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: #000; /* Obsidian Black */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container til artikler - sikrer høj ydeevne ved scrolling */
        .artikel-container {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
            background: #000;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Guld-accent scrollbar (valgfrit til moderne browsere) */
        .artikel-container::-webkit-scrollbar {
            width: 6px;
        }
        .artikel-container::-webkit-scrollbar-thumb {
            background: #D4AF37; /* Guld farve */
            border-radius: 10px;
        }
    </style>

    <script>
        // Sprogindstilling: Dansk
        localStorage.setItem("site_lang", "da");

        // Beskyttelse: Frame-buster
        if (window.self !== window.top) {
            window.top.location.href = window.location.href;
        }
    </script>
</head>

<body>

    <div class="artikel-container">
        <iframe 
            src="https://phrinusomyis.com/articles" 
            title="PHRINUSOMYIS Officielle Artikler"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

</body>
    
</html>
