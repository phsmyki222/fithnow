<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRINUSOMYIS | Nyheder</title>

    <style>
        /* Nulstilling for et rent, professionelt look */
        * {
            box-sizing: border-box;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: #000; /* Obsidian sort */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container optimeret til hurtig indlæsning af nyhedsstrømme */
        .nyheds-beholder {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
            background: #000;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Guld-accent på scrollbar for at matche brand-identitet */
        .nyheds-beholder::-webkit-scrollbar {
            width: 4px;
        }
        .nyheds-beholder::-webkit-scrollbar-thumb {
            background: #D4AF37; /* Guld */
            border-radius: 2px;
        }
    </style>

    <script>
        // Sprogindstilling: Dansk
        localStorage.setItem("site_lang", "da");

        // Frame-buster: Beskytter mod uautoriseret indlejring
        if (window.self !== window.top) {
            window.top.location.href = window.location.href;
        }
    </script>
</head>

<body>

    <div class="nyheds-beholder">
        <iframe 
            src="https://phrinusomyis.com/news" 
            title="PHRINUSOMYIS Nyheder & Opdateringer"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

</body>
    
</html>
