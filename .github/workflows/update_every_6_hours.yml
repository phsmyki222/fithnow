name: PHRINUSOMYIS Updates

# Run every 6 hours
on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:      # allows manual run

permissions:
  contents: write         # gives the bot permission to save changes

jobs:
  update_site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run update_pages.py
        run: python update_pages.py

      - name: Run rss.xml.py
        run: python rss.xml.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated update: $(date)" || echo "No changes to commit"
          git push
